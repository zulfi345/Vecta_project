name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil kode
        uses: actions/checkout@v4

      - name: Install Python
        run: sudo apt update && sudo apt install -y python3-pip zip unzip openjdk-17-jdk

      - name: Install Buildozer
        run: pip install buildozer

      # 🔥 FIX ERROR NDK
      - name: Install NDK 25b
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip android-ndk-r25b-linux.zip
          mv android-ndk-r25b $HOME/android-ndk

      - name: Set NDK
        run: echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV

      # 🔥 Hapus cache lama
      - name: Clean build
        run: buildozer android clean

      - name: Build APK
        run: yes | buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vecta-apk
          path: bin/*.apk

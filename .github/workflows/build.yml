name: Build APK (FINAL FIX)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Clean build
        run: |
          rm -rf .buildozer
          yes | buildozer android clean

      - name: 🚀 Build APK
        run: |
          yes | buildozer android debug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

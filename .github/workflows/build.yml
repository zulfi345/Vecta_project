name: Build APK (Kivy / Buildozer)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILDOZER_ALLOW_ROOT: 1

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.10

    - name: ⚙️ Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libffi-dev \
          libssl-dev

    - name: 📦 Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython

    - name: 📜 Accept Android SDK licenses (FIX ERROR UTAMA)
      run: |
        mkdir -p ~/.android
        echo "y" | sdkmanager --licenses || true

    - name: 🛠️ Build APK
      run: |
        buildozer android debug

    - name: 📤 Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: bin/*.apk

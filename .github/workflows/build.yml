name: Build APK (FINAL STABLE)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 🔥 Pastikan environment bersih
      - name: 🧹 Clean environment
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf .gradle

      # 🔥 Install dependency tambahan (biar ga missing lagi)
      - name: 📦 Install dependencies
        run: |
          apt update
          apt install -y zip unzip openjdk-17-jdk

      # 🔥 Build APK (auto yes biar ga stuck root prompt)
      - name: 🚀 Build APK
        run: |
          yes | buildozer android debug

      # 🔥 Upload hasil
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

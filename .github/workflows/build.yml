"""
Aplikasi Kivy minimal untuk test build.
"""
from kivy.app import App
from kivy.uix.label import Label

class TestApp(App):
    def build(self):
        # Tampilkan label dengan tulisan ini
        return Label(text='[b]Build Berhasil![/b]\nSelamat datang di Vecta Kasir.',
                    markup=True,
                    halign='center')

if __name__ == '__main__':
    TestApp().run()

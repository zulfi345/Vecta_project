name: Build APK (Kivy / Buildozer)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_ALLOW_ROOT: 1

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: ⚙️ Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      # 🔥 STEP 1: INIT (download SDK dulu)
      - name: 🛠️ Init buildozer
        run: |
          buildozer android debug || true

      # 🔥 STEP 2: Fix config Android
      - name: ⚙️ Fix Android config
        run: |
          mkdir -p /home/runner/.android
          echo "count=0" > /home/runner/.android/repositories.cfg

      # 🔥 STEP 3: Accept license
      - name: 📜 Accept Android licenses
        run: |
          yes | /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses || true

      # 🔥 STEP 4: Install SDK versi stabil (ANTI ERROR 37)
      - name: 🧩 Install Android SDK (FIX FINAL)
        run: |
          yes | /github/home/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" || true

      # 🔥 STEP 5: Build APK
      - name: 🚀 Build APK
        run: |
          buildozer android debug

      # 📤 Upload hasil APK
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk

name: Build APK (FIX FINAL)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      BUILDOZER_ALLOW_ROOT: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Install buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # 🔥 INIT dulu biar SDK ke-download
      - name: Init buildozer
        run: |
          buildozer android debug || true

      # 🔥 FIX CONFIG ANDROID
      - name: Fix Android config
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg

      # 🔥 ACCEPT LICENSE (INI YANG KAMU KURANG)
      - name: Accept licenses
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager --licenses

      # 🔥 INSTALL VERSI YANG BENAR (ANTI 37)
      - name: Install SDK 33
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # 🔥 BUILD FINAL
      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
